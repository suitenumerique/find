# Pre-commit hooks configuration
# Install: pre-commit install --install-hooks -t pre-commit -t commit-msg
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
        exclude: ^src/helm/  # Helm templates use Go templating syntax
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main]

  # Ruff - Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Pylint
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: bash -c 'cd src/backend && uv run pylint "${@#src/backend/}"' --
        language: system
        types: [python]
        files: ^src/backend/
        exclude: /migrations/

  # Gitlint - Commit message linting
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]

  # Require signed-off commits (-s flag)
  - repo: local
    hooks:
      - id: check-signoff
        name: check sign-off
        entry: grep -q "^Signed-off-by:"
        language: system
        stages: [commit-msg]
